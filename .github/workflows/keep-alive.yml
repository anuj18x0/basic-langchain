name: Keep Backend Alive

on:
  schedule:
    # Runs every 14 minutes to prevent Render free tier spin-down
    - cron: "*/14 * * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend
        run: |
          curl -sf "${{ secrets.BACKEND_URL }}/docs" || echo "Backend unreachable"
